apiVersion: apps/v1
kind: Deployment
metadata:
  name: "dickagent"
  namespace: "agents-devteam"
  labels:
    app: "dickagent"
    team: "devteam"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "dickagent"
  template:
    metadata:
      labels:
        app: "dickagent"
        team: "devteam"
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: "sa-dickagent"
      containers:
        - name: "dickagent"
          image: "acrshoppoc.azurecr.io/agents/dickagent:latest"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: "config-dickagent"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
